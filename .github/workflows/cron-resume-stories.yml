name: Resume stale story jobs

on:
  schedule:
    # GH Actions cron is best-effort; we're on Vercel Hobby (cap 1/day) so
    # this is the next-best option. Schedule every 2 minutes to maximize
    # the chance of landing within each ~15-min GH scheduling window.
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit resume-stories endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi
          response=$(mktemp)
          code=$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://storybookstudio.org/api/cron/resume-stories)
          body=$(cat "$response")
          echo "HTTP $code"
          echo "Body: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Cron endpoint returned $code"
            exit 1
          fi
          if ! echo "$body" | grep -q '"picked_up"'; then
            echo "::error::Response body missing picked_up field — endpoint likely returned wrong shape"
            exit 1
          fi
